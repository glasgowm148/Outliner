<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">Outliner social preview</title>
  <desc id="desc">Keyboard-first self-hosted outliner with Markdown, sharing, public links, and SQLite persistence.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7efe1"/>
      <stop offset="0.55" stop-color="#e6f0ea"/>
      <stop offset="1" stop-color="#dbe7ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#172033" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>
  <circle cx="1090" cy="90" r="210" fill="#2f6f5e" opacity="0.12"/>
  <circle cx="180" cy="560" r="250" fill="#d6a04f" opacity="0.18"/>
  <g transform="translate(90 78)">
    <text x="0" y="80" font-family="Georgia, 'Times New Roman', serif" font-size="86" font-weight="700" fill="#172033">🗂️ Outliner</text>
    <text x="2" y="132" font-family="Verdana, sans-serif" font-size="28" fill="#334155">Keyboard-first self-hosted outlining</text>
    <g transform="translate(0 190)" font-family="Verdana, sans-serif" font-size="28" fill="#172033">
      <text x="0" y="0">✓ Markdown import/export</text>
      <text x="0" y="54">✓ Sharing and public read-only links</text>
      <text x="0" y="108">✓ SQLite persistence</text>
      <text x="0" y="162">✓ Plain JavaScript, no build step</text>
    </g>
  </g>
  <g transform="translate(690 108)" filter="url(#shadow)">
    <rect width="470" height="390" rx="24" fill="#fffaf0" stroke="#d9c8aa"/>
    <rect x="0" y="0" width="470" height="58" rx="24" fill="#f0dfbd"/>
    <rect x="0" y="34" width="470" height="24" fill="#f0dfbd"/>
    <text x="32" y="38" font-family="Verdana, sans-serif" font-size="22" font-weight="700" fill="#172033">Project Notes</text>
    <g font-family="Verdana, sans-serif" font-size="22" fill="#172033">
      <text x="36" y="104">▾ 🧠 Research</text>
      <text x="72" y="154">▸ Sources</text>
      <text x="72" y="204">▾ Draft</text>
      <text x="108" y="254">Markdown export</text>
      <text x="108" y="304">Share review link</text>
      <text x="36" y="354">▸ ✅ Publish</text>
    </g>
  </g>
  <text x="92" y="566" font-family="Verdana, sans-serif" font-size="24" fill="#475569">github.com/glasgowm148/Outliner</text>
</svg>
