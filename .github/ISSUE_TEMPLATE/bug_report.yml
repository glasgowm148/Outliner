name: Bug report
description: Report something that is broken or behaving unexpectedly.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Clear reproduction steps are the fastest way to get it fixed.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: "Example: importing this markdown outline nests rows at the wrong level."
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include the smallest example that triggers the issue.
      placeholder: |
        1. Start the app with `npm start`
        2. Paste this outline:
        3. Observe...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser
      placeholder: "Chrome 124, Firefox 125, Safari 17, etc."
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "node --version"
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant console/server output or attach screenshots.
      render: text
