<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TabRows</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <div class="topbar">
      <label class="search-wrap" for="searchInput">
        <input id="searchInput" class="search-input" type="search" placeholder="Find in list" aria-label="Find in list" />
      </label>
      <div class="controls">
        <button id="undoBtn" class="nav-icon-btn" type="button" aria-label="Undo last change" title="Undo last change">
          <svg viewBox="0 0 20 20" aria-hidden="true" focusable="false">
            <path d="M8 5 3 10l5 5" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.7" />
            <path d="M4 10h6.6c3.1 0 5.4 2 5.4 5" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.7" />
          </svg>
        </button>
        <select id="listSelect" aria-label="Saved lists"></select>
        <button id="newListBtn" type="button">New</button>
        <button id="deleteListBtn" type="button">Delete</button>
      </div>
    </div>

    <header class="header">
      <input id="title" class="title" value="TabRows" aria-label="List name" />
    </header>

    <nav id="breadcrumbs" class="breadcrumbs" aria-label="Breadcrumbs"></nav>

    <section id="list" class="list" aria-label="Rows"></section>
  </main>

  <script src="app.js"></script>
</body>
</html>
